apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wso2-apim
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MohamedOmarSkhiri/wso2-apim-k3s.git
    targetRevision: master
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wso2-apim
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
