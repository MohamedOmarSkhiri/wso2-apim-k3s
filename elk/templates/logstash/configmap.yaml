apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: {{ .Values.global.namespace }}
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false

  pipelines.yml: |
    - pipeline.id: wso2-logs
      path.config: "/usr/share/logstash/pipeline/wso2-logs.conf"
    - pipeline.id: wso2-analytics
      path.config: "/usr/share/logstash/pipeline/wso2-analytics.conf"

  wso2-logs.conf: |
    input {
      beats {
        port => 5044
        type => "wso2-logs"
      }
    }
    filter {
      if [type] == "wso2-logs" {
        grok {
          match => {
            "message" => "\[%{TIMESTAMP_ISO8601:log_timestamp}\] %{LOGLEVEL:log_level}\s+\{%{DATA:class}\} - %{GREEDYDATA:log_message}"
          }
          tag_on_failure => ["_grokparsefailure_wso2"]
        }
        date {
          match => ["log_timestamp", "ISO8601"]
          target => "@timestamp"
          remove_field => ["log_timestamp"]
        }
        if [log_level] in ["ERROR", "FATAL"] {
          mutate { add_tag => ["error"] }
        }
        mutate {
          add_field => {
            "environment" => "local-k3s"
            "service" => "wso2-apim"
          }
        }
      }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "wso2-logs-%{+YYYY.MM.dd}"
      }
    }

  wso2-analytics.conf: |
    input {
      http {
        port => 8080
        codec => json
        type => "wso2-analytics"
      }
    }
    filter {
      if [type] == "wso2-analytics" {
        mutate {
          add_field => {
            "environment" => "local-k3s"
            "service"     => "wso2-apim"
          }
        }
        if [responseCode] {
          mutate {
            convert => { "responseCode" => "integer" }
          }
          if [responseCode] >= 400 {
            mutate { add_tag => ["api-error"] }
          }
        }
      }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "wso2-analytics-%{+YYYY.MM.dd}"
      }
    }
