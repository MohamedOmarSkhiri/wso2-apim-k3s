apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: {{ .Values.global.namespace }}
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false

  pipelines.yml: |
    - pipeline.id: wso2-main
      path.config: "/usr/share/logstash/pipeline/wso2-main.conf"

  wso2-main.conf: |
    input {
      beats {
        port => 5044
      }
    }
    filter {
      if [log_type] == "wso2-logs" {
        grok {
          match => {
            "message" => "\[%{TIMESTAMP_ISO8601:log_timestamp}\] %{LOGLEVEL:log_level}\s+\{%{DATA:class}\} - %{GREEDYDATA:log_message}"
          }
          tag_on_failure => ["_grokparsefailure_wso2"]
        }
        date {
          match => ["log_timestamp", "ISO8601"]
          target => "@timestamp"
          remove_field => ["log_timestamp"]
        }
        if [log_level] in ["ERROR", "FATAL"] {
          mutate { add_tag => ["error"] }
        }
        mutate {
          add_field => {
            "environment" => "local-k3s"
            "service" => "wso2-apim"
          }
        }
      } else if [log_type] == "wso2-analytics" {
        grok {
          match => ["message", "%{GREEDYDATA:UNWANTED} apimMetrics:%{GREEDYDATA:apimMetrics}, %{GREEDYDATA:UNWANTED2} :%{GREEDYDATA:properties}"]
        }
        json {
          source => "properties"
        }
      }
    }
    output {
      if [log_type] == "wso2-logs" {
        elasticsearch {
          hosts => ["http://elasticsearch:9200"]
          index => "wso2-logs-%{+YYYY.MM.dd}"
        }
      } else if [log_type] == "wso2-analytics" {
        if [apimMetrics] == " apim:response" {
          elasticsearch {
            hosts => ["http://elasticsearch:9200"]
            index => "apim_event_response"
          }
        } else if [apimMetrics] == " apim:faulty" {
          elasticsearch {
            hosts => ["http://elasticsearch:9200"]
            index => "apim_event_faulty"
          }
        }
      }
    }
