apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
    - name: http
      port: 8080
      targetPort: 8080
    - name: api
      port: 9600
      targetPort: 9600
  type: ClusterIP
