apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: kibana
  ports:
    - name: http
      port: 5601
      targetPort: 5601
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kibana-route
  namespace: {{ .Values.global.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.kibana.host }}`)
      kind: Rule
      services:
        - name: kibana
          port: 5601
  tls:
    secretName: kibana-tls-secret
